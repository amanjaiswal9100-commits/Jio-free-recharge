<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jio Free Recharge Offer</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #eef4ff;
}

/* Header */
header {
    background: #0a2885;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
}

/* Container */
.container {
    max-width: 400px;
    margin: 50px auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
}

/* Input */
input, select {
    width: 100%;
    padding: 12px;
    margin-top: 12px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    background: #0a2885;
    color: white;
    border: none;
    margin-top: 20px;
    cursor: pointer;
    font-size: 16px;
    border-radius: 6px;
}

button:hover {
    background: #061a5c;
}

/* Status */
#loading, #success, #prank {
    display: none;
    text-align: center;
    margin-top: 20px;
}

/* Success */
#success {
    color: green;
    font-size: 18px;
}

/* Prank */
#prank {
    color: red;
    font-size: 22px;
    animation: pop 0.5s ease;
}

/* Progress Bar */
.progress {
    width: 100%;
    background: #ddd;
    height: 8px;
    border-radius: 5px;
    margin-top: 10px;
    overflow: hidden;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: #0a2885;
    transition: width 0.3s;
}

/* Footer */
footer {
    text-align: center;
    margin-top: 20px;
    font-size: 14px;
    color: gray;
}

@keyframes pop {
    from {transform: scale(0);}
    to {transform: scale(1);}
}
</style>
</head>

<body>

<header>Jio Free Recharge Offer 2026</header>

<div class="container">
    <h3>Get Free Recharge</h3>

    <input type="number" placeholder="Enter Jio Number" id="number">

    <select id="plan">
        <option>Select Plan</option>
        <option>₹149 - 1GB/day</option>
        <option>₹239 - 1.5GB/day</option>
        <option>₹399 - 2GB/day</option>
    </select>

    <button onclick="startRecharge()">Get Recharge</button>

    <div id="loading">
        Processing... ⏳
        <div class="progress">
            <div class="progress-bar" id="bar"></div>
        </div>
    </div>

    <div id="success">Recharge Successful ✅</div>

    <div id="prank">
        🎉 APRIL FOOL 😂 <br>
        Free recharge kuch nahi hota bhai 😜
    </div>
</div>

<footer>Made by Aman 😎</footer>

<script>
function startRecharge() {
    let num = document.getElementById("number").value;
    let plan = document.getElementById("plan").value;

    if(num.length != 10 || plan === "Select Plan") {
        alert("Enter valid details!");
        return;
    }

    document.getElementById("loading").style.display = "block";

    let width = 0;
    let bar = document.getElementById("bar");

    let interval = setInterval(() => {
        width += 10;
        bar.style.width = width + "%";

        if(width >= 100) {
            clearInterval(interval);

            document.getElementById("loading").style.display = "none";
            document.getElementById("success").style.display = "block";

            setTimeout(() => {
                document.getElementById("success").style.display = "none";
                document.getElementById("prank").style.display = "block";
            }, 2000);
        }
    }, 300);
}
</script>

</body>
</html>
